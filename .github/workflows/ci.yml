name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Format check
        run: forge fmt --check src test
        working-directory: contracts

      - name: Build
        run: forge build
        working-directory: contracts

      - name: Test
        run: forge test -vv
        working-directory: contracts

  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/amberboard/package-lock.json

      - name: Install
        run: npm ci
        working-directory: apps/amberboard

      - name: Test
        run: npm test
        working-directory: apps/amberboard
